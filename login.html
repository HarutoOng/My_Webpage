<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <!-- Bootstrap 5 CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        
        body {
            background-image: url('background.jpg') !important;
            background-repeat: no-repeat !important;
            background-size: cover !important;
            background-position: center center !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background-color: rgba(255, 255, 255, 0);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 400px;
        }

        h2{
            color:#13174d;
            font-weight:700;
        }

        a:hover{
            color:white;
        }
    </style>
</head>
<body>


<div class="login-card">
    <h2 class="text-center mb-4">Login</h2>
    
    <form action="index.html" method="POST">
        
        <!-- Email Input with Floating Label and Large Size (.form-control-lg) -->
        <div class="form-floating mb-3">
            <input type="email" class="form-control form-control-lg text-dark" id="emailInput" placeholder="name@example.com" required>
            <label for="emailInput" class="text-dark">Email Address</label>
        </div>
        
        <!-- Password Input with Floating Label showing a Fake Error State (.is-invalid) -->
        <div class="form-floating mb-3">
            <input type="password" class="form-control form-control-lg is-invalid text-dark" id="passwordInput" placeholder="Password" value="12345">
            <label for="passwordInput" class="text-dark">Password</label>
            <!-- Error message text label -->
            <div class="invalid-feedback text-warning fw-bold">
                Invalid password! Please try again.
            </div>
        </div>

        </form> <a href="register.html" class="text-center mt-3 d-block text-decoration-none text-light">Don't have an account? Register here.</a>
        <button type="submit" class="btn btn-outline-secondary w-100 btn-lg mt-2 text-light">Sign In</button>
    </form> 
    
    </form>
        <button type="submit" class="btn btn-outline-secondarys w-100 btn-lg mt-2">
        <a href="index.html" class="text-center d-block text-decoration-none text-light
        ">Back to Home</a></button>
    </form> 
    
</div>


</body>
</html>
