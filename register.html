<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            font-family:'Poppins',sans-serif;
             background-image: url('background.jpg') !important;
            background-repeat: no-repeat !important;
            background-size: cover !important;
            background-position: center center !important;
            min-height: 100vh;
        }

        .register-card{
            width:100%;
            max-width: 450px;
            background:rgba(62, 39, 35, 0);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:20px;
            padding:35px;
            color:#e7edff;
            box-shadow:0 10px 25px rgba(0,0,0,.3);
        }

        h2{
            color:#091529;
            font-weight:700;
        }

        .btn-primary{
            background:linear-gradient(90deg,#37566f,#3c658b);
            border:none;
            border-radius:10px;
            font-weight:600;
            transition:.3s;
        }

        .btn-primary:hover{
            background:linear-gradient(90deg,#5d4037,#6f4e37);
            transform:scale(.98);
        }

        a{
            color:#ffe0b2;
            text-decoration:none;
        }

        a:hover{
            color:white;
        }
    </style>
</head>

<body>

<div class="register-card">

    <h2 class="text-center mb-4">Create Account</h2>

    <form action="index.html" method="POST" onsubmit="event.preventDefault();">

        <!-- Full Name -->
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input
                type="text"
                class="form-control"
                name="fullname"
                placeholder="Juan Dela Cruz"
                required>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input
                type="password"
                class="form-control"
                name="password"
                placeholder="Create Password"
                required>
        </div>

        <!-- Birthdate -->
        <div class="mb-3">
            <label class="form-label">Birthdate</label>
            <input
                type="date"
                class="form-control"
                name="birthdate"
                required>
        </div>

        <!-- Terms -->
        <div class="form-check mb-4">
            <input
                class="form-check-input"
                type="checkbox"
                id="terms"
                required>

            <label class="form-check-label" for="terms">
                I agree to the Data Privacy Policy and Terms & Conditions.
            </label>
        </div>

           </form>
        <button type="submit" class="btn btn-outline-secondary w-100 btn-lg mt-2 text-light">Submit Registration</button>
    </form> 
    
        <p class="text-center mt-3">
        <a href="login.html" class="text-center mt-3 d-block text-decoration-none text-light">Already have an account? Login here</a>
    </p>

    </form>
        <button type="submit" class="btn btn-outline-secondarys w-100 btn-lg mt-2">
        <a href="index.html" class="text-center d-block text-decoration-none text-light">Back to Home</a></button>
    </form>

</body>
</html>
